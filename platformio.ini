;
; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Library dependencies
lib_deps =
	; WiFi and WiFiClientSecure are built-in
	knolleary/PubSubClient@^2.8
	ArduinoJson
	bblanchon/ArduinoJson@^7.0.0

; Optional: QR/Barcode decoding libraries (uncomment one)
; Option 1: ZXing-Cpp (supports QR + many barcode types)
;  https://github.com/nu-book/zxing-cpp
;   Uncomment the line below and comment out quirc
;   git+https://github.com/nu-book/zxing-cpp.git

; Option 2: Quirc (QR codes only, lighter weight)
;   Uncomment the line below and comment out zxing-cpp
;   git+https://github.com/dlbeer/quirc.git

; Build flags
build_flags =
	; Enable camera driver
	-D USE_ESP32_CAMERA
	; Increase partition size for camera + JSON
	; See partitions.csv in the sketch folder

; Upload settings
upload_port = /dev/cu.SLAB_USBtoUART
; For Windows upload_port = COM3 (change to your port)
